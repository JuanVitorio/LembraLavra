{% load static %}

<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excluir Palavra</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="shortcut icon" type="image/png" href="{% static 'img/icone.ico' %}">
</head>

<body>

<nav class="navbar">
    <div class="nav-itens">
        <a
            href="{% url 'words:home' %}"
            class="{% if request.path == '/' %}active{% endif %}"
        >
            Palavras
        </a>
    
        <a
            href="{% url 'words:categories' %}"
            class="{% if '/categories/' in request.path %}active{% endif %}"
        >
            Categorias
        </a>
    
        <a
            href="{% url 'words:languages' %}"
            class="{% if '/languages/' in request.path %}active{% endif %}"
        >
            Línguas
        </a>
    </div>
    <div class="user-status">
        {% if user.is_authenticated %}
            {{ user.username }}
        {% else %}
            <a href="{% url 'login' %}">
                Entrar
            </a>
        {% endif %}
    </div>
</nav>

    <div class="container">

        <div class="card">

            <h1>Excluir Palavra</h1>

            <p>
                Tem certeza que deseja excluir
                <strong>{{ word.name }}</strong>?
            </p>

            <form method="POST">
                <div class="question">
                    {% csrf_token %}
    
                    <button type="submit" class="btn btn-delete">
                        Confirmar Exclusão
                    </button>
    
                    <a href="{% url 'words:home' %}" class="btn btn-primary">
                        Cancelar
                    </a>
                </div>

            </form>

        </div>

    </div>

</body>

</html>
